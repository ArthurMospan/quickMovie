<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="QuickMovie — свайпай трейлери як TikTok, шукай фільми за допомогою ШІ, створюй спільний вішліст з партнером." />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>QuickMovie — Свайпай. Зберігай. Дивись.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      /* Loading screen styles — shown before React mounts */
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
      #splash-screen img {
        width: 96px;
        height: 96px;
        border-radius: 24px;
        animation: splashPulse 1.5s ease-in-out infinite;
      }
      #splash-screen p {
        margin-top: 20px;
        color: rgba(255,255,255,0.4);
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen shown while React loads -->
    <div id="splash-screen">
      <img src="/logo.png" alt="QuickMovie" />
      <p>QuickMovie</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
